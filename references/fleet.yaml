# Fleet registry — which providers the orchestrator can dispatch to.
# Lean by design: only what's needed to INVOKE a provider lives here.
# Qualitative "which model for what" notes live in
# ~/.claude/knowledge/universal/routing.md and evolve via /consolidate-routing.
#
# Fields:
#   name              unique key, [a-z0-9-]+, used as /fleet test <name>
#   kind              cli | http
#   enabled           true | false (disabled providers are skipped, not invoked)
#   cost_tier         paid | free | local
#   command_template  (cli only) {{prompt}} required, {{model}} optional
#   stdin             (cli only, optional) true = template has no {{prompt}}; the
#                     prompt is piped via stdin (quote-safe). false = explicit VETO
#                     of the automatic clean-tail stdin promotion for CLIs that do
#                     not read stdin (e.g. agy). Absent = promotion applies when the
#                     template's tail is a standalone quoted {{prompt}}.
#   model_default     (optional) fallback when --model not given
#   env               (optional) env vars set before invoking, restored after
#   base_url          (http only) read by scripts/fleet/<name>.ps1
#   role              (optional) draft | bulk | finisher — cascade stage (Slice B).
#                     Absent -> inferred: local/free = draft, paid = finisher.
#   adapter           (optional) names the worker-adapter that meters this provider
#                     and maps its rate-limit responses to Usage-Governor states
#                     (auto-tick + auto-lockout). Absent = unmetered. v1: github-models.
#   saturate          (optional) true | false — opt into the active saturation driver:
#                     when this worker has a budget and is under-utilized, routing
#                     up-ranks it (economy mode) to spend its pre-paid allotment first.
#                     Default false. BOX-PRIVATE: set a real `saturate: true` (and the
#                     budget) only in your live ~/.baton/fleet.yaml.
#   saturation_target (optional, float) utilization % the driver pushes toward before it
#                     stops boosting. Default 99.9.
#   platform          (optional) claude | codex | gemini | github | local — Lever 4
#                     identity; journaled now, consumed by the cost/speed advisor later.
#   timeout_s         (http only, optional) per-request timeout; default 300 in the
#                     lm-studio hatch (large pinned models cold-load before generating).
#   capabilities      (optional) explicit capability claims — a provider WITH this
#                     list is a candidate for ONLY those capabilities; without it,
#                     the blanket general_capabilities grant applies (frontier CLIs).
#                     Canonical taxonomy (matches Gauntlet battery names):
#                     code-gen, code-transform, commit-msg, extract-json,
#                     summarize-short, summarize-long, synthesize, write-personal,
#                     write-scientific, write-formal, ocr, embed, judge, reasoning,
#                     vision, triage, classify, review
#   triage / classify  — structured task classification (issue → type/priority/risk)
#   review            — competitive acceptance review: emit JSON findings
#                       (severity/area/summary) for the Acceptance/Polish Gate
#   budget            (optional, int) usage budget per reset window — read by the
#                     Usage Governor forecast (days-to-exhaustion). BOX-PRIVATE: set
#                     real values only in your live ~/.baton/fleet.yaml, never here.
#   context           (optional) loaded context of the pinned profile (tokens);
#                     claims below a capability_floors entry are filtered out
#   usage_class       (optional) tight (small specialist, fine while Kevin is active)
#                     | broad (15GB+ generalist, idle-gated in a later slice)
#   agentic           (optional) true | false — edit-eligibility for /baton:go --execute
#                     (agentic labor into a run worktree). Authoritative when present;
#                     absent -> inferred from platform ∈ {claude, codex, gemini}.
#                     Non-agentic providers are filtered out of edit tasks (their
#                     diff-apply path arrives in Slice 3).
#
# VRAM rule (d043): run ONE model-serving process per box — e.g. never enable
# ollama AND lm-studio on the same machine; they cannot see each other's VRAM
# use and concurrent big loads spill to system RAM. PIN explicit model names
# ('auto' = unpinned = the server's first listed model, rarely what you want).
# To split big/small roles, add multiple entries against the SAME server.

# Default roster for /research and /ensemble when no --providers/--tier given.
research_default: [claude-cli, codex, ollama-local]
# Broad capabilities served by the general (conversational) models below.
# The router treats every ENABLED provider as a candidate for these.
general_capabilities: [code-gen, reasoning, summarize]

# Min context (tokens) a provider must declare to claim a capability.
capability_floors:
  summarize-long: 65536
  judge: 4096

# Personal/keep models (globs): inventory tags them, recommendations never
# propose culling them, the router can never claim them (they're unregistered).
keep_list: ['*heretic*']

# learned_routing (optional, top-level) — BOX-PRIVATE, default OFF. When set true in
# your live ~/.baton/fleet.yaml, Select-Capability biases its ECONOMY ranking by each
# worker's LEARNED effective cost (slice 3, d060): a worker that has cost more per unit
# quality (Acceptance-Gate verdicts ÷ spend, folded from $BATON_HOME/runs) yields toward
# the next cost tier; a learned-cheap worker reaches toward the tier below. Bounded to an
# adjacent-tier shift, confidence-gated (only trusted rows move routing), saturation-
# floored. Champion mode ignores it. Off / absent => routing is byte-for-byte unchanged.
# learned_routing: true   # set ONLY in your live box file, never in this shared seed.

providers:
  - name: claude-cli
    kind: cli
    enabled: true
    cost_tier: paid
    role: finisher
    platform: claude
    command_template: 'claude -p "{{prompt}}"'

  # --sandbox workspace-write: codex downgrades untrusted dirs (e.g. Baton's
  # throwaway run worktrees) to a READ-ONLY sandbox and, with approval never,
  # exits 0 having edited nothing — a silent no-op for /baton:go --execute.
  # The explicit policy scopes writes to the cwd, which IS the worktree.
  - name: codex
    kind: cli
    enabled: true
    cost_tier: paid
    role: finisher
    platform: codex
    command_template: 'codex exec --sandbox workspace-write "{{prompt}}"'

  # agy does NOT read stdin: the clean-tail stdin promotion would turn this into a
  # bare `agy --print` ("flag needs an argument"), and `agy --print -` treats the
  # dash as an empty prompt (exit 0, generic greeting — a silent no-op). stdin: false
  # vetoes the promotion; the prompt interpolates inline. CAVEAT: inline breaks on
  # embedded double quotes, so route agy quote-free labor prompts, not JSON-schema
  # prompts (e.g. planning).
  - name: gemini-antigravity
    kind: cli
    enabled: true
    cost_tier: paid
    role: finisher
    platform: gemini
    stdin: false
    command_template: 'agy --print "{{prompt}}"'

  - name: gh-copilot
    kind: cli
    enabled: true
    cost_tier: paid
    role: bulk
    platform: github
    command_template: 'gh copilot suggest "{{prompt}}"'

  # ── Triage workers (Sprint 1): explicit model pins for the triage role. ──
  # stdin: true so the JSON-schema-heavy triage prompt is piped, never
  # interpolated through Invoke-Expression (which would mangle quotes/braces).
  # The real competitive reviewer pair (e.g. Codex + Opus) is BOX-PRIVATE — set it
  # in your live ~/.baton/fleet.yaml; these seed grants are an example pool only.
  - name: claude-haiku
    kind: cli
    enabled: true
    cost_tier: paid
    stdin: true
    capabilities: [triage, classify, research, summarize-short, review]
    model_default: 'claude-haiku-4-5-20251001'
    command_template: 'claude -p --model claude-haiku-4-5-20251001'

  - name: claude-sonnet
    kind: cli
    enabled: true
    cost_tier: paid
    stdin: true
    capabilities: [triage, research, code-gen, reasoning, summarize, review]
    model_default: 'claude-sonnet-4-6'
    command_template: 'claude -p --model claude-sonnet-4-6'
    # budget: 0   # example only — set a real per-window budget in live ~/.baton/fleet.yaml

  - name: opencode
    kind: cli
    enabled: false
    cost_tier: free
    role: draft
    command_template: 'opencode -p "{{prompt}}"'

  - name: ollama-local
    kind: cli
    enabled: true
    cost_tier: local
    role: draft
    platform: local
    model_default: 'devstral:24b'
    command_template: 'ollama run {{model}} "{{prompt}}"'

  # Remote Ollama box over Tailscale (Plan 9 / issue #20). Uses the native
  # /api/generate HTTP endpoint via scripts/fleet/ollama-box2.ps1 — the local
  # `ollama run` CLI hangs against a remote host. Set base_url to the box's
  # Tailscale address (per-host: edit your deployed ~/.claude/fleet.yaml).
  - name: ollama-box2
    kind: http
    enabled: true
    cost_tier: local
    role: draft
    platform: local
    model_default: 'dolphin3:8b'
    base_url: 'http://100.115.71.9:11434'   # wraith2 over Tailscale
    usage_class: tight

  - name: lm-studio
    kind: http
    enabled: true
    cost_tier: local
    role: draft
    platform: local
    base_url: 'http://localhost:1234'
    model_default: 'qwen/qwen3-coder-30b'   # explicit pin per d043 — never 'auto'
    capabilities: [code-gen, code-transform, summarize-short, synthesize]
    context: 32768
    usage_class: broad

  # Small/judge specialist on the same LM Studio server as lm-studio above.
  # The explicit `judge` claim in capabilities drives selection — no file-order
  # dependency needed.
  - name: lm-studio-small
    kind: http
    enabled: true
    cost_tier: local
    role: draft
    platform: local
    base_url: 'http://localhost:1234'
    model_default: 'phi-4'                  # explicit pin per d043 — never 'auto'
    capabilities: [judge, commit-msg, extract-json, summarize-short]
    context: 16384
    usage_class: tight

  - name: github-models
    kind: cli
    enabled: false            # opt-in: enable in your live ~/.baton/fleet.yaml
    cost_tier: free
    adapter: github-models    # adapter-backed -> auto-metered + rate-limit-aware
    platform: github
    model_default: openai/gpt-4o-mini
    command_template: 'gh models run {{model}}'
    stdin: true               # pipe the prompt via stdin — gh models blocks reading
                              #   inherited stdin under pwsh; stdin is also quote-safe.
    capabilities: [code-gen, summarize-short, classify]
    # budget: <int>           # BOX-PRIVATE — set the real per-window allotment ONLY
    #                           in your live ~/.baton/fleet.yaml, never in this seed.
    saturate: false           # opt-in: set true (with a real budget) in live ~/.baton/fleet.yaml
    # saturation_target: 99.9 # optional; default is 99.9
