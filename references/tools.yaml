# tools.yaml — non-LLM callable capabilities, co-equal with fleet.yaml models.
# Lean by design: only what's needed to SELECT and INVOKE a tool lives here.
# "Which tool for what" qualitative notes live in
# ~/.claude/knowledge/universal/routing.md and evolve via /consolidate-routing.
#
# Fields:
#   name         unique key, [a-z0-9-]+
#   kind         python | cli | http | stdio-json   (how it is invoked)
#   enabled      true | false          (disabled tools are skipped, not invoked)
#   cost_tier    paid | free | local
#   capability   the need it serves (the routing key), e.g. pdf-extract
#   module       (kind:python) optional importable module path used by doctor
#   command_template   (python/cli/stdio-json) executable declaration
#   base_url / endpoint   (http; endpoint defaults to /v1/chat/completions)
#   max_prompt_bytes / probe / agentic   optional instrument ABI declarations
#   role         (optional) draft | bulk | finisher — cascade stage (Slice B); these
#                specialized local tools are all draft-class.
#   platform     (optional) platform identity (Lever 4); local for on-box tools.

tools:
  - name: docling
    kind: python
    enabled: true
    cost_tier: local
    role: draft
    platform: local
    capability: pdf-extract
    module: docling.document_converter
  - name: git-commit-message
    kind: cli
    enabled: true
    cost_tier: local
    role: draft
    platform: local
    capability: commit-msg
    command_template: 'ollama run tavernari/git-commit-message'
    stdin: true            # the staged diff is piped in
  - name: nuextract
    kind: cli
    enabled: true
    cost_tier: local
    role: draft
    platform: local
    capability: struct-extract
    command_template: 'ollama run nuextract'
  - name: deepseek-ocr
    kind: cli
    enabled: true
    cost_tier: local
    role: draft
    platform: local
    capability: ocr
    command_template: 'ollama run deepseek-ocr'
