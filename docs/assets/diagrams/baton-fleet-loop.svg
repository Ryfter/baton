<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#1e1e1e"/></marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#22c55e"/></marker>
  </defs>
  <rect x="0" y="0" width="800" height="540" fill="#ffffff"/>
  <text x="400" y="32" text-anchor="middle" font-size="26" font-weight="700" fill="#1e1e1e">How the fleet loop works</text>
  <text x="400" y="58" text-anchor="middle" font-size="14" fill="#757575">one hardened path — every dispatch metered, journaled, learned from</text>

  <!-- arrows first (under nodes) -->
  <line x1="497" y1="124" x2="628" y2="200" stroke="#1e1e1e" stroke-width="2" marker-end="url(#ah)"/>
  <text x="572" y="150" font-size="13" fill="#1e1e1e">you ask</text>
  <line x1="660" y1="284" x2="622" y2="416" stroke="#1e1e1e" stroke-width="2" marker-end="url(#ah)"/>
  <text x="666" y="352" font-size="13" fill="#1e1e1e">dispatch</text>
  <line x1="493" y1="461" x2="384" y2="461" stroke="#1e1e1e" stroke-width="2" marker-end="url(#ah)"/>
  <text x="410" y="452" text-anchor="middle" font-size="13" fill="#1e1e1e">captures</text>
  <line x1="150" y1="418" x2="150" y2="286" stroke="#1e1e1e" stroke-width="2" marker-end="url(#ah)"/>
  <text x="158" y="352" font-size="13" fill="#1e1e1e">feeds</text>
  <line x1="265" y1="238" x2="551" y2="238" stroke="#22c55e" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#ag)"/>
  <text x="408" y="230" text-anchor="middle" font-size="13" fill="#15803d">learned routing</text>

  <!-- nodes -->
  <rect x="305" y="90" width="190" height="52" rx="10" fill="#a5d8ff" stroke="#4a9eed"/>
  <text x="400" y="122" text-anchor="middle" font-size="15" fill="#1e1e1e">1 · Task or prompt</text>

  <rect x="555" y="200" width="212" height="82" rx="10" fill="#d0bfff" stroke="#8b5cf6"/>
  <text x="567" y="230" font-size="15" font-weight="600" fill="#6d28d9">2 · Route + Govern</text>
  <text x="567" y="254" font-size="13" fill="#757575">pick instrument · check cap</text>

  <rect x="495" y="420" width="245" height="82" rx="10" fill="#b2f2bb" stroke="#22c55e"/>
  <text x="507" y="450" font-size="15" font-weight="600" fill="#15803d">3 · Instruments</text>
  <text x="507" y="474" font-size="13" fill="#757575">codex · grok · gemini · local</text>

  <rect x="80" y="420" width="300" height="82" rx="10" fill="#c3fae8" stroke="#06b6d4"/>
  <text x="92" y="446" font-size="15" font-weight="600" fill="#0e7490">4 · Journal line</text>
  <text x="92" y="468" font-size="13" fill="#757575">provider | Ns | exit | tok:N(basis)</text>
  <text x="92" y="487" font-size="13" fill="#757575">| cost | phase — the record of truth</text>

  <rect x="48" y="200" width="215" height="82" rx="10" fill="#ffd8a8" stroke="#f59e0b"/>
  <text x="60" y="230" font-size="15" font-weight="600" fill="#b45309">5 · Learn + Failover</text>
  <text x="60" y="252" font-size="13" fill="#757575">ratings tune routing;</text>
  <text x="60" y="270" font-size="13" fill="#757575">swap peer near a cap</text>

  <text x="400" y="345" text-anchor="middle" font-size="16" font-weight="600" fill="#8b5cf6">OBSERVE · GOVERN · LEARN</text>
  <text x="400" y="368" text-anchor="middle" font-size="13" fill="#757575">every dispatch, metered &amp; remembered</text>
</svg>
