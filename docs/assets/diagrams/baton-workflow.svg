<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#1e1e1e"/></marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#22c55e"/></marker>
  </defs>
  <rect x="0" y="0" width="800" height="560" fill="#ffffff"/>
  <text x="400" y="36" text-anchor="middle" font-size="26" font-weight="700" fill="#1e1e1e">Using /baton — the happy path</text>
  <text x="400" y="62" text-anchor="middle" font-size="15" fill="#757575">from a spark to shipped — which command drives each step</text>

  <g text-anchor="middle" font-size="13" fill="#757575">
    <text x="106" y="185">1 · Idea</text>
    <text x="258" y="185">2 · Start</text>
    <text x="410" y="185">3 · Gate plan</text>
    <text x="562" y="185">4 · Dispatch</text>
    <text x="714" y="185">5 · Accept</text>
  </g>
  <rect x="44"  y="200" width="124" height="84" rx="10" fill="#ffd8a8" stroke="#f59e0b"/>
  <rect x="196" y="200" width="124" height="84" rx="10" fill="#a5d8ff" stroke="#4a9eed"/>
  <rect x="348" y="200" width="124" height="84" rx="10" fill="#fff3bf" stroke="#f59e0b"/>
  <rect x="500" y="200" width="124" height="84" rx="10" fill="#d0bfff" stroke="#8b5cf6"/>
  <rect x="652" y="200" width="124" height="84" rx="10" fill="#fff3bf" stroke="#f59e0b"/>
  <g text-anchor="middle" font-size="14" fill="#1e1e1e">
    <text x="106" y="247">/baton:idea</text>
    <text x="258" y="247">/baton:start</text>
    <text x="410" y="247">/baton:plan-gate</text>
    <text x="562" y="247">/baton:route</text>
    <text x="714" y="247">/baton:gate</text>
  </g>
  <g stroke="#1e1e1e" stroke-width="2" marker-end="url(#ah)">
    <line x1="168" y1="242" x2="194" y2="242"/>
    <line x1="320" y1="242" x2="346" y2="242"/>
    <line x1="472" y1="242" x2="498" y2="242"/>
    <line x1="624" y1="242" x2="650" y2="242"/>
  </g>

  <rect x="44" y="320" width="470" height="52" rx="10" fill="#fff3bf" stroke="#f59e0b"/>
  <text x="279" y="351" text-anchor="middle" font-size="14" fill="#1e1e1e">Shortcut: /baton:go "&lt;outcome&gt;" --execute — runs steps 2–5 full-auto.</text>

  <line x1="714" y1="286" x2="690" y2="376" stroke="#22c55e" stroke-width="2" marker-end="url(#ag)"/>
  <text x="726" y="335" font-size="13" fill="#15803d">verified</text>
  <rect x="610" y="380" width="150" height="58" rx="10" fill="#b2f2bb" stroke="#22c55e"/>
  <text x="685" y="415" text-anchor="middle" font-size="15" fill="#1e1e1e">Ship — merge / PR</text>

  <text x="400" y="470" text-anchor="middle" font-size="14" fill="#1e1e1e">Need one specific model instead of routing?   /baton:codex | grok | gemini | agy  "&lt;prompt&gt;"</text>
  <text x="400" y="498" text-anchor="middle" font-size="14" fill="#757575">Every step is journaled — time, exit, tokens, cost — and visible in the dashboard.</text>
</svg>
