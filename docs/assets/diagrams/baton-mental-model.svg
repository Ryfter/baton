<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#1e1e1e"/></marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#22c55e"/></marker>
  </defs>
  <rect x="0" y="0" width="800" height="600" fill="#ffffff"/>
  <text x="400" y="36" text-anchor="middle" font-size="26" font-weight="700" fill="#1e1e1e">Baton — Conduct the Fleet</text>
  <text x="400" y="62" text-anchor="middle" font-size="15" fill="#757575">CLI-first · three tiers, like an orchestra</text>

  <rect x="40" y="82" width="720" height="100" rx="12" fill="#eef2ff" stroke="#93b8f0"/>
  <text x="56" y="105" font-size="15" font-weight="600" fill="#2563eb">1 · CONDUCTOR</text>
  <rect x="210" y="112" width="380" height="54" rx="10" fill="#a5d8ff" stroke="#4a9eed"/>
  <text x="400" y="144" text-anchor="middle" font-size="16" fill="#1e1e1e">You + Claude Code — the thin interface</text>

  <line x1="360" y1="185" x2="360" y2="220" stroke="#1e1e1e" stroke-width="2" marker-end="url(#ah)"/>
  <text x="360" y="208" text-anchor="middle" font-size="12" fill="#1e1e1e" dx="-22">plans</text>
  <line x1="445" y1="222" x2="445" y2="187" stroke="#22c55e" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ag)"/>
  <text x="445" y="208" text-anchor="middle" font-size="12" fill="#15803d" dx="28">journal</text>

  <rect x="40" y="225" width="720" height="110" rx="12" fill="#f1ecff" stroke="#b9a5ea"/>
  <text x="56" y="248" font-size="15" font-weight="600" fill="#7c3aed">2 · ORCHESTRATORS  (the brain)</text>
  <g fill="#d0bfff" stroke="#8b5cf6">
    <rect x="95" y="262" width="150" height="58" rx="10"/>
    <rect x="260" y="262" width="150" height="58" rx="10"/>
    <rect x="425" y="262" width="150" height="58" rx="10"/>
    <rect x="590" y="262" width="150" height="58" rx="10"/>
  </g>
  <g text-anchor="middle" font-size="15" fill="#1e1e1e">
    <text x="170" y="296">Routing</text>
    <text x="335" y="296">Gates</text>
    <text x="500" y="296">Decision loop</text>
    <text x="665" y="296">Usage + Cost</text>
  </g>

  <line x1="360" y1="338" x2="360" y2="372" stroke="#1e1e1e" stroke-width="2" marker-end="url(#ah)"/>
  <text x="360" y="360" text-anchor="middle" font-size="12" fill="#1e1e1e" dx="-30">dispatches</text>
  <line x1="445" y1="373" x2="445" y2="339" stroke="#22c55e" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ag)"/>
  <text x="445" y="360" text-anchor="middle" font-size="12" fill="#15803d" dx="26">results</text>

  <rect x="40" y="376" width="720" height="130" rx="12" fill="#eafcef" stroke="#9be0ad"/>
  <text x="56" y="399" font-size="15" font-weight="600" fill="#15803d">3 · INSTRUMENTS  (the fleet)</text>
  <g fill="#b2f2bb" stroke="#22c55e">
    <rect x="95" y="414" width="150" height="60" rx="10"/>
    <rect x="260" y="414" width="150" height="60" rx="10"/>
    <rect x="425" y="414" width="150" height="60" rx="10"/>
    <rect x="590" y="414" width="150" height="60" rx="10"/>
  </g>
  <g text-anchor="middle" font-size="15" fill="#1e1e1e">
    <text x="170" y="449">Codex</text>
    <text x="335" y="449">Grok</text>
    <text x="500" y="449">Gemini / agy</text>
    <text x="665" y="449">Local models</text>
  </g>
  <text x="400" y="494" text-anchor="middle" font-size="13" fill="#15803d">paid cloud CLIs · free CLIs · your own local models — one hardened, journaled dispatch path</text>

  <text x="400" y="536" text-anchor="middle" font-size="16" fill="#1e1e1e">CLI-first: every capability is a /baton: command.</text>
  <text x="400" y="560" text-anchor="middle" font-size="14" fill="#757575">The web dashboard is a control board over those same commands — never a parallel path.</text>
</svg>
