research_default: [stub-cli, stub-with-model]

providers:
  - name: stub-cli
    kind: cli
    enabled: true
    cost_tier: free
    command_template: 'pwsh -NoProfile -Command "Write-Output hello-{{prompt}}"'

  - name: stub-with-model
    kind: cli
    enabled: true
    cost_tier: local
    model_default: 'default-model'
    command_template: 'pwsh -NoProfile -Command "Write-Output {{model}}:{{prompt}}"'

  - name: stub-with-env
    kind: cli
    enabled: true
    cost_tier: local
    env:
      FLEET_TEST_VAR: 'box2-value'
    command_template: 'pwsh -NoProfile -Command "Write-Output env-{{prompt}}"'

  - name: stub-disabled
    kind: cli
    enabled: false
    cost_tier: free
    command_template: 'pwsh -NoProfile -Command "Write-Output nope"'

  - name: stub-http
    kind: http
    enabled: true
    cost_tier: local
    base_url: 'http://localhost:9999'
    model_default: 'auto'

  - name: stub-fail
    kind: cli
    enabled: true
    cost_tier: free
    command_template: 'pwsh -NoProfile -Command "exit 3"'

  - name: stub-slow
    kind: cli
    enabled: true
    cost_tier: free
    command_template: 'pwsh -NoProfile -Command "Start-Sleep -Seconds 10; Write-Output slow-{{prompt}}"'

  - name: stub-tight
    kind: cli
    enabled: true
    cost_tier: local
    usage_class: tight
    command_template: 'pwsh -NoProfile -Command "Write-Output tight-{{prompt}}"'

  # stdin:true provider — the prompt is piped via stdin, template carries no
  # {{prompt}}. Guards the regression where the stdin path called
  # Resolve-FleetCommand with an empty prompt and threw. Echoes stdin back.
  - name: stub-stdin
    kind: cli
    enabled: true
    cost_tier: local
    stdin: true
    command_template: 'pwsh -NoProfile -Command [Console]::In.ReadToEnd()'
