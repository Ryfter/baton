<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Baton Routing Dashboard{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%230b1220'/><path d='M24 52h52M58 34l18 18-18 18' fill='none' stroke='%2338bdf8' stroke-width='10' stroke-linecap='round' stroke-linejoin='round'/></svg>">
  <!-- Vendored locally so the dashboard runs fully offline (no CDN / Google Fonts). -->
  <script src="/static/vendor/htmx.min.js"></script>
  <script src="/static/vendor/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1><a href="/">Baton</a></h1>
    <nav class="topnav">
      <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Home</a>
      <a href="/projects" class="{% if request.url.path.startswith('/projects') %}active{% endif %}">Portfolio</a>
    </nav>
    <span class="server-time">{{ server_time }}</span>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
