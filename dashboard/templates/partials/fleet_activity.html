{# Fleet cockpit styles live in static/style.css (consolidated, no inline <style>). #}
{% set f = fleet | default(None) %}
<div class="fleet-cockpit">
  <h2>🚀 Fleet Activity <span class="fleet-muted">— live, every model running concurrently</span></h2>

  {% if f is none %}
    <p class="fleet-muted">loading…</p>
  {% else %}
    {% if f.active %}
      {% for run in f.active %}
        <div class="fleet-run active">
          <div class="fleet-run-head">
            <span class="fleet-kind">{{ run.kind }}</span>
            <span class="fleet-muted">{{ run.run_id }}</span>
            <span class="fleet-muted">⏱ {{ run.elapsed_s }}s</span>
            <span class="fleet-muted">{{ run.counts.running }} running · {{ run.counts.done }} done{% if run.counts.error %} · {{ run.counts.error }} err{% endif %}</span>
          </div>
          {% if run.prompt %}<div class="fleet-prompt">{{ run.prompt }}</div>{% endif %}
          <div class="fleet-provs">
            {% for p in run.providers %}
              <span class="prov prov-{{ p.state }}">
                {% if p.live %}<span class="pulse"></span>{% endif %}
                {{ p.provider }}{% if p.label and p.label != p.provider %} · {{ p.label }}{% endif %}
                <span class="prov-dur">{{ p.duration_s }}s</span>
              </span>
            {% endfor %}
          </div>
          {# Partial responses as they arrive (#26): a provider's text appears the
             moment that model finishes, while others may still be running. #}
          {% set shown = run.providers | selectattr('preview') | list %}
          {% if shown %}
            <div class="fleet-outputs">
              {% for p in shown %}
                <details class="fleet-output">
                  <summary><span class="prov-name">{{ p.provider }}{% if p.label and p.label != p.provider %} · {{ p.label }}{% endif %}</span> — {{ p.state }} · {{ p.duration_s }}s</summary>
                  <pre>{{ p.preview }}{% if p.preview_truncated %}<span class="fleet-trunc"> … (truncated)</span>{% endif %}</pre>
                </details>
              {% endfor %}
            </div>
          {% endif %}
          {% if run.synthesis %}
            <details class="fleet-synth" open>
              <summary>🧬 Synthesis preview</summary>
              <pre>{{ run.synthesis }}{% if run.synthesis_truncated %}<span class="fleet-trunc"> … (truncated)</span>{% endif %}</pre>
            </details>
          {% endif %}
        </div>
      {% endfor %}
    {% else %}
      <p class="fleet-muted">No fleet runs in flight. Dispatch <code>/ensemble</code>, <code>/six-hats</code>, <code>/council</code>, or a fleet task batch and every model lights up here at once.</p>
    {% endif %}

    {% if f.recent %}
      <h3 class="fleet-muted" style="margin:.8rem 0 .2rem;">Recent runs</h3>
      {% for run in f.recent %}
        <div class="fleet-recent">
          <span class="fleet-kind">{{ run.kind }}</span>
          <span>{{ run.started_human }}</span>
          <span>{{ run.providers|length }} models</span>
          <span>{{ run.counts.done }} ok{% if run.counts.error %} · {{ run.counts.error }} err{% endif %}</span>
        </div>
        {% if run.synthesis %}
          <details class="fleet-synth">
            <summary>🧬 {{ run.run_id }} synthesis</summary>
            <pre>{{ run.synthesis }}{% if run.synthesis_truncated %}<span class="fleet-trunc"> … (truncated)</span>{% endif %}</pre>
          </details>
        {% endif %}
      {% endfor %}
    {% endif %}
  {% endif %}
</div>
