{% if error %}
  <p class="muted">{{ error }}</p>
{% else %}
  <div class="decision-card" style="border:1px solid #30363d;border-radius:6px;padding:0.75rem 1rem;background:#0d1117;">
    <div class="decision-head" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">
      <strong>{{ name }}</strong>
      <button type="button" onclick="this.closest('.decision-detail').innerHTML='';"
              style="background:none;border:1px solid #30363d;color:#8b949e;border-radius:4px;cursor:pointer;padding:0 .4rem;"
              aria-label="Close decision">✕</button>
    </div>
    <div class="decision-body">{{ body_html | safe }}</div>
  </div>
{% endif %}
